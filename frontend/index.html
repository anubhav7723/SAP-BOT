<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP Knowledge Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

  <!-- Header outside the chat container -->
  <header class="app-header">
    <h1 class="app-title">SAP Bot</h1>
    <div class="status-line">
      <span id="statusDot" style="display: none;"></span>
      <span id="statusText">checking backend&hellip;</span>
    </div>
  </header>

  <div class="console">

  <!-- Chat log -->
  <main class="chat-log" id="chatLog">
    <div class="msg msg-bot" data-module="">
      <div class="msg-avatar">AI</div>
      <div class="msg-body">
        <div class="msg-meta"><span class="msg-role">Assistant</span></div>
        <div class="msg-text">
          Ready. Ask about material management, sales &amp; distribution, or S/4HANA processes &mdash;
          transaction codes, config paths, or field-level questions all work.
        </div>
      </div>
    </div>
  </main>

  <!-- Typing indicator -->
  <div class="typing-row" id="typingRow" hidden>
    <div class="msg-avatar">AI</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>

  <!-- Composer -->
  <footer class="composer">
    <form id="chatForm" autocomplete="off">
      <textarea
        id="chatInput"
        rows="1"
        placeholder="e.g. What is SAP?"
        maxlength="2000"
      ></textarea>
      <button type="submit" id="sendBtn" aria-label="Send message">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 12L20 4L14 20L11 13L4 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        </svg>
      </button>
    </form>
    <div class="composer-hint">Enter to send &middot; Shift+Enter for new line</div>
  </footer>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
